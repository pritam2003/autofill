<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Job Autofill Copilot Demo</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: #f8fafc;
        color: #111827;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 920px;
        padding: 40px 20px;
      }

      h1 {
        font-size: 36px;
        line-height: 1.1;
        margin: 0 0 8px;
      }

      p {
        color: #475569;
        line-height: 1.5;
      }

      form {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        display: grid;
        gap: 22px;
        margin-top: 24px;
        padding: 24px;
      }

      fieldset {
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 16px;
      }

      legend {
        font-weight: 800;
        padding: 0 6px;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        border: 1px solid #cbd5e1;
        border-radius: 7px;
        font: inherit;
        min-height: 40px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 120px;
      }

      .choice {
        align-items: center;
        display: flex;
        gap: 8px;
        font-weight: 600;
      }

      .choice input {
        min-height: auto;
      }

      button {
        background: #111827;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        justify-self: start;
        min-height: 42px;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Demo Job Application</h1>
      <p>Use this local page to test the extension after loading it unpacked. Serve it over localhost, or enable “Allow access to file URLs” for the extension if you open this file directly.</p>

      <form>
        <fieldset>
          <legend>Contact information</legend>
          <div class="grid">
            <label>First name <input name="candidateFirstName" autocomplete="given-name"></label>
            <label>Last name <input name="candidateLastName" autocomplete="family-name"></label>
            <label>Email address <input type="email" name="email"></label>
            <label>SFU co-op email <input type="email" name="sfuCoopEmail"></label>
            <label>Mobile phone <input type="tel" name="phone"></label>
            <label>City <input name="city"></label>
            <label>State / province code
              <select name="provinceCode">
                <option value="">Choose...</option>
                <option value="AB">Alberta</option>
                <option value="BC">BC</option>
                <option value="ON">Ontario</option>
              </select>
            </label>
            <label>Country
              <select name="countryCode">
                <option value="">Choose...</option>
                <option value="CA">Canada</option>
                <option value="US">United States</option>
              </select>
            </label>
            <label>Postal code <input name="postal-code"></label>
            <label>LinkedIn profile <input name="linkedin_url"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Work eligibility</legend>
          <div class="grid">
            <label>Are you legally authorized to work in the United States?
              <select name="workAuthorization">
                <option value="">Choose...</option>
                <option>Yes</option>
                <option>No</option>
              </select>
            </label>
            <label>Will you now or in the future require visa sponsorship?
              <select name="sponsorship">
                <option value="">Choose...</option>
                <option>Yes</option>
                <option>No</option>
              </select>
            </label>
            <label>Years of professional experience <input type="number" name="yearsExperience"></label>
            <label>Desired salary <input name="salaryExpectation"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Voluntary self-identification</legend>
          <label>Gender
            <select name="candidateGender">
              <option value="">Choose...</option>
              <option>Man</option>
              <option>Woman</option>
              <option>Non-binary</option>
              <option>I do not wish to answer</option>
            </select>
          </label>
          <label>Veteran status
            <select name="veteranStatus">
              <option value="">Choose...</option>
              <option>I am not a protected veteran</option>
              <option>I identify as one or more protected veterans</option>
              <option>I do not wish to answer</option>
            </select>
          </label>
        </fieldset>

        <fieldset>
          <legend>Questions</legend>
          <label>Why are you interested in this role?
            <textarea name="whyInterested"></textarea>
          </label>
        </fieldset>

        <button type="button">Next</button>
      </form>
    </main>
  </body>
</html>
